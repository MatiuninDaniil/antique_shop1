{% extends "dashboard/base.html" %}
{% block title %}Delete Item — Dashboard{% endblock %}
{% block content %}
<div class="topbar"><h1>Delete Item</h1></div>
<div class="card p-4" style="max-width:500px;">
  <p>Are you sure you want to delete <strong>{{ item.name }}</strong>?</p>
  <p class="text-secondary" style="font-size:.9rem;">This action cannot be undone.</p>
  <form method="post" class="d-flex gap-2 mt-3">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Yes, delete</button>
    <a href="{% url 'dashboard_items' %}" class="btn btn-outline-secondary">Cancel</a>
  </form>
</div>
{% endblock %}
