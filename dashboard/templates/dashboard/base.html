<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Admin — Faust's Attic{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background:#111; color:#f5ede0; min-height:100vh; }
    .sidebar {
      width:220px; background:#0a0602; min-height:100vh;
      border-right:1px solid #c4943a22; padding:1.5rem 0;
      position:fixed; top:0; left:0;
    }
    .sidebar-brand {
      font-size:1.1rem; color:#c4943a; letter-spacing:.05em;
      padding:.75rem 1.5rem 1.5rem; border-bottom:1px solid #c4943a22;
      display:block; text-decoration:none;
    }
    .sidebar-brand span { display:block; font-size:.7rem; color:#7a6248; margin-top:2px; }
    .sidebar-link {
      display:flex; align-items:center; gap:.6rem;
      padding:.65rem 1.5rem; color:#c8b89a;
      text-decoration:none; font-size:.9rem;
      border-left:3px solid transparent; transition:all .2s;
    }
    .sidebar-link:hover,
    .sidebar-link.active { color:#e8c87a; border-left-color:#c4943a; background:rgba(196,148,58,.06); }
    .sidebar-section {
      font-size:.65rem; letter-spacing:.2em; text-transform:uppercase;
      color:#4a3a2a; padding:.75rem 1.5rem .25rem;
    }
    .main { margin-left:220px; padding:2rem; }
    .topbar {
      display:flex; justify-content:space-between; align-items:center;
      margin-bottom:2rem; padding-bottom:1rem;
      border-bottom:1px solid #c4943a22;
    }
    .topbar h1 { font-size:1.5rem; color:#f5ede0; margin:0; }
    .stat-card {
      background:#1c1007; border:1px solid #c4943a22;
      border-radius:8px; padding:1.5rem;
    }
    .stat-card .stat-num { font-size:2.5rem; font-weight:700; color:#c4943a; line-height:1; }
    .stat-card .stat-label { font-size:.8rem; color:#7a6248; letter-spacing:.1em; text-transform:uppercase; margin-top:.25rem; }
    .table { color:#f5ede0; }
    .table thead th { color:#7a6248; font-size:.8rem; letter-spacing:.1em;
                      text-transform:uppercase; border-color:#c4943a22; font-weight:400; }
    .table td { border-color:#c4943a11; vertical-align:middle; }
    .table tbody tr:hover { background:rgba(196,148,58,.04); }
    .btn-gold { background:#c4943a; color:#0f0904; border:none; }
    .btn-gold:hover { background:#e8c87a; color:#0f0904; }
    .card { background:#1c1007; border:1px solid #c4943a22; color:#f5ede0; }
    .form-control, .form-select {
      background:#111; color:#f5ede0; border:1px solid #c4943a33;
    }
    .form-control:focus, .form-select:focus {
      background:#111; color:#f5ede0; border-color:#c4943a; box-shadow:none;
    }
    .form-select option { background:#111; }
    .form-label { color:#7a6248; font-size:.85rem; letter-spacing:.05em; }
    .badge-pending   { background:#4a3a1e; color:#e8c87a; }
    .badge-confirmed { background:#1a3a1a; color:#7aba7a; }
    .badge-cancelled { background:#3a1a1a; color:#ba7a7a; }
    .code-pill {
      font-family:monospace; font-size:1rem; font-weight:700;
      color:#e8c87a; letter-spacing:.15em;
      background:#0f0904; border:1px solid #c4943a44;
      padding:.15rem .6rem; border-radius:4px;
    }
    .alert { border-radius:4px; border:none; }
    .alert-success { background:#1a3a1a; color:#7aba7a; }
    .alert-danger   { background:#3a1a1a; color:#ba7a7a; }
    .alert-warning  { background:#3a2a0a; color:#e8c87a; }
    .alert-info     { background:#1a2a3a; color:#7aaaba; }
  </style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
  <a href="{% url 'dashboard' %}" class="sidebar-brand">
    🏺 Faust's Attic
    <span>Admin Panel</span>
  </a>

  <div class="sidebar-section">Catalogue</div>
  <a href="{% url 'dashboard_items' %}"     class="sidebar-link {% block nav_items %}{% endblock %}">📦 Items</a>
  <a href="{% url 'dashboard_item_add' %}"  class="sidebar-link {% block nav_add %}{% endblock %}">➕ Add Item</a>

  <div class="sidebar-section">Orders</div>
  <a href="{% url 'dashboard_reservations' %}" class="sidebar-link {% block nav_res %}{% endblock %}">🔖 Reservations</a>
  <a href="{% url 'dashboard_sales' %}"        class="sidebar-link {% block nav_sales %}{% endblock %}">💰 Sales</a>

  <div class="sidebar-section">Customers</div>
  <a href="{% url 'dashboard_clients' %}"  class="sidebar-link {% block nav_clients %}{% endblock %}">👥 Clients</a>

  <div class="sidebar-section mt-4">Site</div>
  <a href="{% url 'catalog' %}" class="sidebar-link" target="_blank">🌐 View Shop</a>
  <a href="{% url 'logout' %}"  class="sidebar-link">🚪 Log Out</a>
</aside>

<!-- MAIN -->
<div class="main">
  {% if messages %}
    {% for msg in messages %}
      <div class="alert alert-{{ msg.tags }} alert-dismissible fade show mb-3">
        {{ msg }}
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert"></button>
      </div>
    {% endfor %}
  {% endif %}

  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
