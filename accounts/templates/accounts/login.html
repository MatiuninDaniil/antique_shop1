{% extends "catalog/base.html" %}
{% block title %}Sign In — Faust's Attic{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card p-4">
      <h2 class="text-gold mb-4">Sign In</h2>
      <form method="post">
        {% csrf_token %}
        {% for field in form %}
          <div class="mb-3">
            <label class="form-label text-secondary">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}
              <div class="text-danger mt-1" style="font-size:.85rem;">{{ field.errors.0 }}</div>
            {% endif %}
          </div>
        {% endfor %}
        <button type="submit" class="btn btn-gold w-100 mt-2">Sign In</button>
      </form>
      <p class="text-center text-secondary mt-3" style="font-size:.9rem;">
        New here? <a href="{% url 'register' %}" class="text-gold">Create account</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
